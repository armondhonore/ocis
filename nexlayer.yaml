application:
  name: ocis
  pods:
    - name: ocis-pod
      image: "registry.nexlayer.io/user_01kece1xyh817dwff7wnarhkxd/ocis:9f0b5f0-fix9"
      servicePorts:
        - 9200
      path: /
      env:
        - name: OCIS_INSECURE
          value: "true"
        - name: OCIS_BOOTSTRAP_SESSIONS_ENABLED
          value: "true"
        - name: OCIS_STORAGE_PATH
          value: "/var/lib/ocis"
      healthcheck:
        path: /