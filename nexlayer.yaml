application:
  name: ocis
  pods:
  - name: app
    image: owncloud/ocis:8.0.5
    path: /
    command: sh -c "ocis init || true; exec ocis server"
    servicePorts:
    - 9200
    vars:
      OCIS_INSECURE: "true"
      PROXY_HTTP_ADDR: "0.0.0.0:9200"
      OCIS_URL: "https://relaxed-weasel-ocis.cloud.nexlayer.ai"
      IDM_CREATE_DEMO_USERS: "true"
      IDM_ADMIN_PASSWORD: "admin"
    volumes:
    - name: ocis-data
      mountPath: /var/lib/ocis
      size: 20Gi
    - name: ocis-config
      mountPath: /etc/ocis
      size: 1Gi
